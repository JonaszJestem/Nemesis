name: Nemesis - Build, Test & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run unit tests
        working-directory: Nemesis/Tests
        run: dotnet test --configuration Release --verbosity normal

  build:
    name: Build Nemesis.dll
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Workspace (game assemblies)
        uses: actions/checkout@v4
        with:
          repository: JonaszJestem/Nemesis-Workspace
          path: Workspace
          ssh-key: ${{ secrets.WORKSPACE_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Update version in assembly info
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"Nemesis\", \"[0-9]*\.[0-9]*\.[0-9]*\"/\"Nemesis\", \"${VERSION}\"/" Nemesis/Core/NemesisMod.cs

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Nemesis
        working-directory: Nemesis
        run: >
          dotnet build "Nemesis.csproj" --configuration Release
          /p:GameAssemblyPath="${{ github.workspace }}/Workspace/lib/game"
          /p:MelonLoaderPath="${{ github.workspace }}/Workspace/lib/melonloader"
          /p:PluginsPath="${{ github.workspace }}/Workspace/lib/game"

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: nemesis-dll
          path: Nemesis/bin/Release/netstandard2.1/Nemesis.dll

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download DLL
        uses: actions/download-artifact@v4
        with:
          name: nemesis-dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nemesis v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: Nemesis.dll
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
